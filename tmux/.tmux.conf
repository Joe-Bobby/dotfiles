# =============================================
# TMUX CONFIG — starter
# prefix key is Ctrl+b by default

# --- Mouse support ---
set -g mouse on

# --- 256 colors ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Smulx=\E[4::%p1%dm'

# --- Vi-style navigation keys in copy mode ---
# "vi keys" just means you use h/j/k/l to move
# instead of arrow keys. That's it — not Vim!
set -g mode-keys vi
set -g status-keys vi

# --- Copy mode keybindings (vi style) ---
# Enter copy mode:       Prefix + [
# Start selection:       Space
# Copy selection:        Enter
# Paste:                 Prefix + ]
# Quit copy mode:        q
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# --- Easier reload (Prefix + r) ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Easier splits ---
bind | split-window -h
bind - split-window -v

# --- Window switching with Alt+arrows ---
bind -n M-Left previous-window
bind -n M-Right next-window

# --- Start window numbering at 1 ---
set -g base-index 1
set -g pane-base-index 1

# --- Status bar styling ---
set -g status-bg colour235
set -g status-fg colour15
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour232,bg=colour33] #S #[default]"
set -g status-right "#[fg=colour33,bg=colour235] %Y-%m-%d %H:%M #[default]"
set -g window-status-current-format " #[fg=colour33,bold]#I:#W#[default] "
set -g window-status-format " #I:#W "

# --- History limit ---
set -g history-limit 10000

# --- True color support ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:Tc"
